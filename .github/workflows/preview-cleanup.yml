name: Preview Cleanup

on:
  pull_request:
    types: [closed]

  # --- Supabase branching (requires Pro plan) ---
  # Uncomment for daily orphan sweep:
  # schedule:
  #   - cron: "0 6 * * *"

jobs:
  cleanup-pr:
    name: Cleanup PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # --- Supabase branching cleanup (requires Pro plan) ---
      # Uncomment when branching is available:
      #
      # - uses: supabase/setup-cli@v1
      #   with:
      #     version: latest
      #
      # - name: Delete Supabase preview branch
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     supabase branches delete "pr-${{ github.event.pull_request.number }}" \
      #       --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" \
      #       --yes 2>/dev/null || echo "Branch already deleted or never existed"
      # --- End branching section ---

      - name: Comment cleanup confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id,
                body: existing.body + '\n\n---\n\nPreview closed.',
              });
            }
