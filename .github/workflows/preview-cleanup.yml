name: Preview Cleanup

on:
  pull_request:
    types: [closed]

  # --- Supabase branching (requires Pro plan) ---
  # Uncomment for daily orphan sweep:
  # schedule:
  #   - cron: "0 6 * * *"

jobs:
  cleanup-pr:
    name: Cleanup PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # --- Supabase branching cleanup (requires Pro plan) ---
      # Uncomment when branching is available:
      #
      # - uses: supabase/setup-cli@v1
      #   with:
      #     version: latest
      #
      # - name: Delete Supabase preview branch
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     supabase branches delete "pr-${{ github.event.pull_request.number }}" \
      #       --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" \
      #       --yes 2>/dev/null || echo "Branch already deleted or never existed"
      # --- End branching section ---

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Remove preview deployments for this PR
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          URLS=$(curl -s \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-pr=$PR_NUMBER&limit=50" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | \
            python3 -c "
          import sys, json
          for d in json.load(sys.stdin).get('deployments', []):
              print(d['url'])
          ")

          if [ -z "$URLS" ]; then
            echo "No preview deployments found for PR #$PR_NUMBER"
            exit 0
          fi

          COUNT=0
          for URL in $URLS; do
            echo "Removing $URL"
            vercel rm "$URL" --yes --safe --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
            COUNT=$((COUNT + 1))
          done
          echo "Removed $COUNT preview deployment(s) for PR #$PR_NUMBER"

      - name: Comment cleanup confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id,
                body: existing.body + '\n\n---\n\nPreview closed. Vercel deployments removed.',
              });
            }
