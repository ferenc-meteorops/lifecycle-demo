name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  preview-deploy:
    name: Deploy preview (backend changes)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      # --- Supabase branching (requires Pro plan) ---
      # Uncomment when branching is available:
      #
      # - uses: supabase/setup-cli@v1
      #   with:
      #     version: latest
      #
      # - name: Create Supabase preview branch
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     supabase branches create "pr-${PR}" \
      #       --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" \
      #       --git-branch "${{ github.head_ref }}" \
      #       --yes 2>/dev/null || echo "Branch may already exist, continuing..."
      #
      # - name: Wait for branch to be healthy
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     for i in $(seq 1 30); do
      #       OUTPUT=$(supabase branches get "pr-${PR}" \
      #         --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" \
      #         -o json 2>/dev/null || echo '{"status":"UNKNOWN"}')
      #       STATUS=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))")
      #       echo "Attempt $i/30 — status: $STATUS"
      #       if [ "$STATUS" = "ACTIVE_HEALTHY" ] || [ "$STATUS" = "MIGRATIONS_PASSED" ]; then
      #         echo "Branch is ready."
      #         exit 0
      #       fi
      #       sleep 10
      #     done
      #     echo "::error::Branch did not become healthy within 5 minutes"
      #     exit 1
      #
      # - name: Fetch branch credentials
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     supabase branches get "pr-${PR}" \
      #       --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" \
      #       -o env >> "$GITHUB_ENV"
      # --- End branching section ---

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Run Alembic migrations
        id: alembic
        run: |
          pip install -r backend/requirements.txt
          cd backend
          if ! alembic upgrade head 2>&1; then
            echo "::warning::Alembic upgrade failed — likely a migration conflict on the shared DB."
            echo "Purging version table and stamping to this branch's head (expected on free tier without DB branching)."
            alembic stamp --purge head
          fi
          VERSION=$(alembic current 2>/dev/null | awk '{print $1}' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with database
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.DEV_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEPLOY_ENV: preview-pr-${{ env.PR }}
          NEXT_PUBLIC_SCHEMA_VERSION: ${{ steps.alembic.outputs.version }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --meta pr=${{ env.PR }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Preview Environment',
              '',
              '| Component | URL |',
              '|-----------|-----|',
              `| **Frontend** | ${{ steps.deploy.outputs.url }} |`,
              `| **Database** | Dev (shared) |`,
              '',
              `**Alembic migrations**: Applied against dev database`,
              '',
              '> With Supabase Pro, this would use an isolated branch database per PR.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Comment failure on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Preview Deploy Failed\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            });

  frontend-only:
    name: Frontend-only PR (use dev database)
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with dev database
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.DEV_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEPLOY_ENV: preview-pr-${{ github.event.pull_request.number }}
          NEXT_PUBLIC_SCHEMA_VERSION: n/a (frontend-only)

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --meta pr=${{ github.event.pull_request.number }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Preview Environment',
              '',
              '| Component | URL |',
              '|-----------|-----|',
              `| **Frontend** | ${{ steps.deploy.outputs.url }} |`,
              `| **Database** | Dev (shared) |`,
              '',
              'No backend changes detected — preview uses the shared dev Supabase database.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
