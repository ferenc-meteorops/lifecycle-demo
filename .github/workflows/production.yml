name: Production Deploy

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Run Alembic migrations
        id: alembic
        run: |
          pip install -r backend/requirements.txt
          cd backend
          if ! alembic upgrade head 2>&1; then
            echo "::warning::Alembic upgrade failed — likely a preview migration on the shared DB."
            echo "Purging version table and stamping to main's head (expected on free tier without DB branching)."
            alembic stamp --purge head
          fi
          VERSION=$(alembic current 2>/dev/null | awk '{print $1}' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.DEV_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DEPLOY_ENV: production
          NEXT_PUBLIC_SCHEMA_VERSION: ${{ steps.alembic.outputs.version }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
